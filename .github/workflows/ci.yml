name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Framework test suites
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the schemas-vs-CHANGELOG gate can diff origin/main.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install pinned toolchain
        run: npm ci

      # Test discovery is glob-driven via scripts/run-tests.js (single source
      # of truth shared with local runs): it walks the tree, classifies every
      # *.test.* / __tests__ file by runner (vitest, node:test-via-tsx, plain
      # node), fails on unclassifiable files, and runs each group. No
      # hand-kept file lists — a new test file anywhere runs automatically.
      - name: Sync-engine suites (tests/)
        run: npm run test:sync

      - name: Scripts suites (scripts/)
        run: npm run test:scripts

      - name: Hook suites (.claude/hooks/)
        run: npm run test:hooks

      - name: Framework validation (frontmatter, schemas, markdown links)
        run: npm run validate

      - name: Skill-routing evals
        run: npm run eval:routing

      - name: Rule-classification ledger coverage (file + heading + anchor + ladder keywords)
        run: node scripts/check-rule-ledger.js

      # Working-tree layer of the secret posture; GitHub secret scanning +
      # push protection (enabled on the repo) cover history and future pushes.
      # Exemptions: exact-instance entries in scripts/check-secrets-allowlist.json.
      - name: Secret sweep (provider-shaped tokens in tracked files)
        run: node scripts/check-secrets.cjs

      - name: Manifest / settings JSON validity
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8')); console.log('manifest ok')"
          node -e "JSON.parse(require('fs').readFileSync('.claude/settings.json','utf8')); console.log('settings ok')"
          node -e "JSON.parse(require('fs').readFileSync('.claude/hooks/package.json','utf8')); console.log('hooks pkg ok')"

      - name: Version consistency
        run: |
          FV=$(cat .claude/FRAMEWORK_VERSION)
          MV=$(node -p "require('./manifest.json').frameworkVersion")
          if [ "$FV" != "$MV" ]; then echo "::error::FRAMEWORK_VERSION ($FV) != manifest.frameworkVersion ($MV)"; exit 1; fi
          if ! grep -q "^## ${FV}" .claude/CHANGELOG.md; then echo "::error::CHANGELOG missing heading for ${FV}"; exit 1; fi
          echo "version consistency ok ($FV)"

          # Every manifest removedFiles path must actually be absent from the
          # tree — a lingering file would be re-shipped to consumers while
          # sync simultaneously tells them to delete it.
          node -e "
            const { existsSync } = require('fs');
            const removed = require('./manifest.json').removedFiles || [];
            const present = removed.map(r => r.path).filter(p => existsSync(p));
            if (present.length) {
              console.error('::error::removedFiles entries still present in the tree: ' + present.join(', '));
              process.exit(1);
            }
            console.log('removedFiles absence ok (' + removed.length + ' entries checked)');
          "

          # If any schema changed relative to origin/main, schemas/CHANGELOG.md
          # must change too (D10 schema-version discipline). Skip gracefully
          # when the origin ref is unavailable (e.g. shallow or detached runs).
          if git rev-parse --verify origin/main >/dev/null 2>&1; then
            SCHEMA_CHANGES=$(git diff --name-only origin/main -- 'schemas/*.json')
            if [ -n "$SCHEMA_CHANGES" ]; then
              if git diff --quiet origin/main -- schemas/CHANGELOG.md; then
                echo "::error::schemas/*.json changed ($SCHEMA_CHANGES) but schemas/CHANGELOG.md was not updated"
                exit 1
              fi
              echo "schema changelog gate ok (schemas changed WITH changelog update)"
            else
              echo "schema changelog gate ok (no schema changes vs origin/main)"
            fi
          else
            echo "schema changelog gate skipped (origin/main not available)"
          fi
